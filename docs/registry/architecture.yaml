# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: autoload_access_pattern
    status: active
    api: "Singleton name access (e.g. ConfigLoader.get_agents(), AudioManager.play_sfx())"
    not: "Singleton name access for any system other than ConfigLoader and AudioManager"
    adr: docs/architecture/adr-0003-autoload-scene-composition.md
    reason: "ConfigLoader and AudioManager are project-wide services consumed by every system. All other systems are scene-scoped and must be accessed via injected references or typed signals."
    referenced_by:
      - docs/architecture/adr-0003-autoload-scene-composition.md
      - docs/architecture/adr-0006-signal-based-decoupling.md
    added: 2026-05-11
    revised: ""

  - purpose: cross_module_communication_pattern
    status: active
    api: "Three-Tier Model: Tier 1 = typed Godot signals (events), Tier 2 = injected reference method calls (synchronous queries, read-only), Tier 3 = Autoload singleton calls (ConfigLoader/AudioManager only)"
    not: "Event bus Autoload, string-based connect(), get_node() scene discovery, _process() polling, direct cross-system state writes"
    adr: docs/architecture/adr-0006-signal-based-decoupling.md
    reason: "Typed signals provide decoupled event notification with compile-time parameter checking. Injected refs provide safe synchronous queries. The three-tier model ensures every communication pattern is testable in isolation."
    referenced_by:
      - docs/architecture/adr-0006-signal-based-decoupling.md
    added: 2026-05-11
    revised: ""

  - purpose: signal_connection_syntax
    status: active
    api: "source.signal_name.connect(callable) — callable syntax (Godot 4.x)"
    not: "source.connect('signal_name', target, 'method_name') — string-based syntax (deprecated since Godot 4.0)"
    adr: docs/architecture/adr-0006-signal-based-decoupling.md
    reason: "String-based connect() is deprecated in Godot 4.x. Callable syntax is type-safe, validated by the editor, and compatible with static analysis. All new code must use callable syntax."
    referenced_by:
      - docs/architecture/adr-0006-signal-based-decoupling.md
    added: 2026-05-11
    revised: ""

  - purpose: test_framework_and_runner
    status: active
    api: "GUT 9.x (Godot Unit Testing) — headless runner: godot --headless -s res://addons/gut/gut_cmdln.gd -gdir=res://tests -gexit"
    not: "GDUnit4 (different runner format); manual-only testing; any other test addon"
    adr: docs/architecture/adr-0014-test-framework-ci.md
    reason: "GUT is the approved test addon per technical-preferences.md Allowed Libraries. Headless runner is required for GitHub Actions CI. GUT plugin must be activated in project.godot [editor_plugins] or headless runner silently skips all tests."
    referenced_by:
      - docs/architecture/adr-0014-test-framework-ci.md
    added: 2026-05-11
    revised: ""

  - purpose: mock_mode_toggle
    status: active
    api: "ConfigLoader.is_mock() — project-wide boolean read once at DataBridge._ready(); true → all agents use mock file polling; false → all agents use HTTP polling"
    not: "Per-agent mock flags in MVP (deferred post-MVP); environment variables; #if guards; any system other than DataBridge checking is_mock()"
    adr: docs/architecture/adr-0008-mock-mode-strategy.md
    reason: "DataBridge is the sole consumer of is_mock(). Global scope for MVP — either all agents are mocked or none. Consumers (ASM, HUD, TCB) must not check is_mock(). Mock files at res://assets/data/mock/[agent_id].json."
    referenced_by:
      - docs/architecture/adr-0008-mock-mode-strategy.md
    added: 2026-05-11
    revised: ""

  - purpose: tween_lifecycle_pattern
    status: active
    api: |
      create_tween() + bind_node(target) [MANDATORY] +
      sequential phases via chained tween_property() on one Tween +
      re-trigger via kill() + new create_tween() (NOT stop()) +
      cleanup via finished signal connection (NOT await) +
      pause behaviour controlled by owning Node's process_mode
    not: |
      Tween pool / Tween Autoload manager / await tween.finished (when target may free) /
      relying on finished signal after kill() / Tween.stop() for re-trigger semantics /
      multiple Tween instances for sequential phases of one effect
    adr: docs/architecture/adr-0010-tween-lifecycle.md
    reason: "Single project-wide pattern for runtime Tweens prevents three modules (TCB, AAL, HUD) from independently re-solving lifecycle questions. bind_node() closes VERIFY-9 (Tween on freed Node2D). kill()-not-finished and await-pitfall are documented gotchas from godot-specialist consultation 2026-05-11. Pause-via-owning-node aligns HUD pause-immunity with TCB pause-with-game."
    referenced_by:
      - docs/architecture/adr-0010-tween-lifecycle.md
    added: 2026-05-11
    revised: ""

# Example:
#
# api_decisions:
#   - purpose: physics_raycast
#     status: active
#     api: PhysicsServer3D.space_get_direct_state()
#     not: RayCast3D node     # explicitly banned for this purpose
