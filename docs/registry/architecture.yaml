# Architecture Decision Registry
#
# PURPOSE: Single source of truth for key architectural stances that all ADRs
# must agree on. Skills check this before writing new ADRs to detect conflicts
# at authoring time — before stories are created against contradictory decisions.
#
# RULES:
#   - Register a stance when it constrains how OTHER systems must be built.
#     An internal implementation detail that affects only one ADR does not need
#     to be registered.
#   - Never delete entries — set status: superseded_by: ADR-NNNN instead.
#   - When a stance changes: update the entry, set revised: to today's date,
#     add a comment with the old value, and run /architecture-review to check
#     what ADRs are now invalidated.
#   - adr: is the authoritative source. All other ADRs that depend on this
#     stance list themselves in referenced_by.
#
# WRITTEN BY: /architecture-decision (Phase 5 — after ADR is approved)
# READ BY:    /architecture-decision (Step 2 — before authoring begins)
#             /architecture-review (Phase 4 — cross-ADR conflict baseline)
#             /create-stories (to embed architectural constraints in stories)
#             /dev-story (to check implementation against accepted stances)
#
# SEARCH PATTERNS (for skills using Grep):
#   All state owners:       Grep pattern="^  - state:" path="docs/registry/architecture.yaml"
#   Who owns player_health: Grep pattern="state: player_health"
#   All signal contracts:   Grep pattern="pattern: signal"
#   Budget for combat:      Grep pattern="system: combat"
#   All forbidden patterns: Grep pattern="^  - pattern:" (forbidden_patterns section)
#   Superseded entries:     Grep pattern="status: superseded"

version: 1
last_updated: ""

# ─── STATE OWNERSHIP ─────────────────────────────────────────────────────────
# Who is the authoritative owner of each piece of shared game state.
# Conflicts: two ADRs claiming to own the same state = data race / authority bug.
#
# Register state when it is READ or WRITTEN by more than one system.
# Internal-only state (never accessed by another system) does not need to be registered.
#
# Required fields: state, owner_system, adr, interface, referenced_by[], added
# interface: how other systems access this state (read-only property, method call,
#   signal, shared resource, etc.) — this is the contract other ADRs depend on.

state_ownership:
  - state: config_data
    status: active
    owner_system: configuration-loader
    adr: docs/architecture/adr-0002-config-loading-persistence.md
    interface: "ConfigLoader.get_agents() -> Array[Dictionary] | get_agent(id) -> Dictionary | get_poll_interval() -> float | get_protocol() -> String | is_mock() -> bool (all read-only; callers must not mutate returned collections)"
    write_access: configuration-loader-only
    referenced_by:
      - docs/architecture/adr-0002-config-loading-persistence.md
    added: 2026-05-11
    revised: ""

  - state: user_settings
    status: active
    owner_system: configuration-loader
    adr: docs/architecture/adr-0002-config-loading-persistence.md
    interface: "ConfigLoader.get_setting(key: StringName, default: Variant) -> Variant | set_setting(key: StringName, value: Variant) -> void | signal setting_changed(key, value)"
    write_access: configuration-loader-only  # other systems call set_setting() — ConfigLoader performs the write
    referenced_by:
      - docs/architecture/adr-0002-config-loading-persistence.md
    added: 2026-05-11
    revised: ""

# Example:
#
# state_ownership:
#   - state: player_health
#     status: active           # active | superseded_by: ADR-NNNN
#     owner_system: health-system
#     adr: docs/architecture/adr-0001-health-system.md
#     interface: "HealthComponent.current_health (read-only float, range 0–max_health)"
#     write_access: health-system-only   # only owner can write; others read
#     referenced_by:
#       - docs/architecture/adr-0001-health-system.md
#       - docs/architecture/adr-0003-combat-system.md   # reads to apply damage
#       - docs/architecture/adr-0007-ui-system.md       # reads to display HUD
#     added: 2026-03-26
#     revised: ""


# ─── INTERFACE CONTRACTS ──────────────────────────────────────────────────────
# How systems are required to communicate with each other.
# Conflicts: one ADR expects signal, another expects direct call = integration bug.
#
# Register a contract when the communication pattern between two systems is
# explicitly decided in an ADR and other systems must follow the same pattern.
#
# pattern options: signal | direct_call | event_bus | shared_resource | rpc | none

interfaces:
  - contract: config_ready_notification
    status: active
    pattern: signal
    producer: configuration-loader
    consumers:
      - data-bridge       # calls get_agents(), get_poll_interval(), is_mock() after signal
      - room-system       # calls get_agents() after signal to build room registry
      - commanders-room-hud  # calls get_setting() after signal for HUD tuning knobs
    adr: docs/architecture/adr-0002-config-loading-persistence.md
    signal_signature: "config_loaded()"
    notes: "Emitted exactly once per application lifetime. Consumers must connect before _ready() completes or use get_state() == 'READY' to check synchronously."
    referenced_by:
      - docs/architecture/adr-0002-config-loading-persistence.md
    added: 2026-05-11
    revised: ""

  - contract: task_completion_event
    status: active
    pattern: signal
    producer: agent-state-machine
    consumers:
      - task-completion-beat   # triggers audio beat + room modulate Tween + emits beat_fired
      - commanders-room-hud    # updates recent completions panel
    adr: docs/architecture/adr-0005-task-completed-signal-source.md
    signal_signature: "task_completed(agent_id: String)"
    notes: "Emitted after agent_state_changed on the same COMPLETED transition. Sole emitter: AgentStateMachine — DataBridge, ACC, and all other modules are consumers only. Repeated COMPLETED payloads must NOT re-emit (guard: no emission when new_state == previous_state)."
    referenced_by:
      - docs/architecture/adr-0005-task-completed-signal-source.md
    added: 2026-05-11
    revised: ""

  - contract: data_bridge_events
    status: active
    pattern: signal
    producer: data-bridge
    consumers:
      - agent-state-machine    # interprets raw_payload → agent state transitions; receives poll failures
      - commanders-room-hud    # receives connection_changed for status indicators
    adr: docs/architecture/adr-0001-data-bridge-transport.md
    signal_signature: |
      agent_response_received(agent_id: String, http_status: int, raw_payload: String)
      agent_connection_changed(agent_id: String, connection_state: String)
      agent_poll_failed(agent_id: String, error_code: int, http_status: int, error_message: String)
    notes: "agent_id is String (not StringName) — value originates from JSON config parsing. raw_payload is emitted unmodified (no JSON parsing). Web CORS strategy is unresolved for MVP — deferred to prototype."
    referenced_by:
      - docs/architecture/adr-0001-data-bridge-transport.md
    added: 2026-05-11
    revised: ""

