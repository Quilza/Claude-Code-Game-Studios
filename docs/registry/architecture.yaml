# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: new_autoload_without_adr
    status: active
    description: "No additional Autoloads may be registered in Project Settings beyond ConfigLoader and AudioManager without a new ADR superseding ADR-0003."
    why: "Each Autoload creates a hidden global dependency. The two-Autoload limit is a deliberate architectural boundary. Expanding it without a documented decision hides coupling and makes the initialization order unpredictable."
    adr: docs/architecture/adr-0003-autoload-scene-composition.md
    added: 2026-05-11

  - pattern: direct_user_settings_write
    status: active
    description: "No system may write to user:// settings files directly. All preference persistence must go through ConfigLoader.set_setting(). No system may open user://settings.json (or any user:// file) with FileAccess for writing without going through ConfigLoader."
    why: "ConfigLoader is the sole owner of user://settings.json. Direct writes from other systems would bypass setting_changed signal emission, break the single-write-point contract, and create race conditions if two systems write simultaneously."
    adr: docs/architecture/adr-0002-config-loading-persistence.md
    added: 2026-05-11

  - pattern: process_polling_for_state
    status: active
    description: "No system may poll another system's state inside _process() or _physics_process(). State changes must propagate via Godot typed signals (Tier 1). Calling getters like get_agent_state() or checking flags in _process() instead of connecting to a signal is banned."
    why: "Polling couples the polling system to the polled system's update frequency, burns CPU every frame regardless of whether state changed, and bypasses the established signal contract. The signal system exists precisely to eliminate this pattern."
    adr: docs/architecture/adr-0006-signal-based-decoupling.md
    added: 2026-05-11

  - pattern: string_based_signal_connect
    status: active
    description: "No signal connection may use the deprecated string-based syntax: source.connect('signal_name', target, 'method_name'). All connections must use the Godot 4.x callable syntax: source.signal_name.connect(callable)."
    why: "String-based connect() is deprecated since Godot 4.0, provides no type safety, cannot be validated by the editor's signal panel, and breaks static analysis. The callable syntax is the established pattern for this engine version."
    adr: docs/architecture/adr-0006-signal-based-decoupling.md
    added: 2026-05-11

  - pattern: scene_tree_discovery
    status: active
    description: "No Phase 2 system may locate another Phase 2 system via get_node(), find_child(), get_parent(), or any scene-tree traversal. All cross-system references must be injected by the Main Scene Bootstrap via inject_*() methods."
    why: "Scene-tree discovery couples systems to their position in the tree, breaks if the tree structure changes, fails in unit tests where the full scene is not present, and creates hidden initialization-order dependencies. Explicit injection is the required pattern (ADR-0003 bootstrap model)."
    adr: docs/architecture/adr-0006-signal-based-decoupling.md
    added: 2026-05-11

  - pattern: direct_cross_system_state_write
    status: active
    description: "No system may write to state owned by another system. A system that needs to cause a state change in another system must emit a signal; the owning system listens and mutates its own state. Direct field writes or setter calls that bypass the owner's internal logic are banned."
    why: "Direct state writes bypass signal emission (breaking observers), corrupt the state ownership model (ADR-0003 bootstrap), and create race conditions if two systems write to the same state. The signal-driven model ensures the owner controls all mutations to its own state."
    adr: docs/architecture/adr-0006-signal-based-decoupling.md
    added: 2026-05-11

  - pattern: tween_without_bind_node
    status: active
    description: "Every Tween created via create_tween() must immediately call bind_node(target) before any tween_property() calls. Tweens without bind_node() leak when their animation target is freed mid-animation, producing 'Object was freed' log spam and orphan Tween objects that survive until SceneTree teardown."
    why: "bind_node() is the Godot 4.6.2-documented mechanism for auto-killing a Tween when its target Node is freed. Without it, freed-target scenarios (agent removed from config, scene transition, HUD slot deletion) produce silent orphan Tweens. The TCB E7 edge case (VERIFY-9) and AAL/HUD lifecycle cases all require this guarantee."
    adr: docs/architecture/adr-0010-tween-lifecycle.md
    added: 2026-05-11

